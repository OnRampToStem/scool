version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: weekly
      day: tuesday
      time: "06:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 10
    groups:
      github-actions:
        patterns:
          - "*"
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: weekly
      day: tuesday
      time: "06:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 10
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: weekly
      day: tuesday
      time: "06:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 10
